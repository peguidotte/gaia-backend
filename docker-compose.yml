services:
  postgres:
    image: postgres:16-alpine
    container_name: gaia-postgres
    environment:
      POSTGRES_DB: gaia
      POSTGRES_USER: gaia
      POSTGRES_PASSWORD: gaia
    ports:
      - "5432:5432"
    volumes:
      - gaia-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaia -d gaia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gaia-postgres-data:
